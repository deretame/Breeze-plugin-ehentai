name: Manual Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Run init script
        run: node init.js

      - name: Resolve version and update PLUGIN_VERSION
        id: version
        run: node build/prepare-release.js

      - name: Commit version update
        run: |
          if git diff --quiet -- src/domain/constants.ts; then
            echo "No version change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/constants.ts
          git commit -m "chore: bump plugin version to ${{ steps.version.outputs.plugin_version }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Install dependencies
        run: pnpm i

      - name: Build
        run: pnpm run build

      - name: Ensure release assets exist
        run: |
          test -f dist/ehentai.bundle.cjs
          test -f dist/ehentai.bundle.cjs.br

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          body: 自动更新
          artifacts: dist/ehentai.bundle.cjs,dist/ehentai.bundle.cjs.br
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
